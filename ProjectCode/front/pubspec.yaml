name: barrier_free_nav
description: 배리어프리(Barrier-Free) 보행자 네비게이션 Flutter 앱

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 지도 ──
  # flutter_map: OpenStreetMap 기반 지도 위젯 (API 키 불필요, 한국 지형 지원)
  flutter_map: ^7.0.0

  # latlong2: flutter_map 의 좌표 데이터 타입 (LatLng)
  latlong2: ^0.9.1

  # ── 네트워크 ──
  # http: 백엔드 API 통신용 HTTP 클라이언트
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
